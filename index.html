<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Lambda Robotics</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="landing">

  <div class="ambient" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <canvas id="particles"></canvas>
    <div class="grid-floor"></div>
  </div>

  <nav id="navbar" class="landing-nav">
    <div class="nav-inner nav-inner--center">
      <a href="#" class="logo">λ Lambda Robotics</a>
    </div>
  </nav>

  <main class="landing-main">
    <div class="landing-copy">
      <div class="mark-wrap">
        <span class="mark-ring"></span>
        <span class="mark">λ</span>
      </div>
      <h1 class="landing-title">
        Lambda <span class="gradient-text">Robotics</span>
      </h1>
      <div class="landing-divider">
        <span class="divider-dot"></span>
        <span class="divider-line"></span>
        <span class="divider-dot"></span>
      </div>
    </div>

    <div class="showcase">
      <div class="orbit orbit-1"></div>
      <div class="orbit orbit-2"></div>
      <div class="orbit-dot orbit-dot-1"></div>
      <div class="orbit-dot orbit-dot-2"></div>
      <div class="orbit-dot orbit-dot-3"></div>

      <div class="showcase-glass">
        <div class="glass-shine"></div>
        <div class="robot-body robot-body--hero">
          <svg viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="60" y="20" width="80" height="70" rx="12" fill="#e6f7f4" stroke="#0d9488" stroke-width="2"/>
            <rect x="78" y="38" width="18" height="12" rx="4" fill="#0d9488" opacity="0.9"/>
            <rect x="104" y="38" width="18" height="12" rx="4" fill="#0d9488" opacity="0.9"/>
            <rect x="82" y="41" width="10" height="6" rx="2" fill="#5eead4"/>
            <rect x="108" y="41" width="10" height="6" rx="2" fill="#5eead4"/>
            <rect x="80" y="62" width="40" height="6" rx="3" fill="#0d9488" opacity="0.6"/>
            <rect x="90" y="90" width="20" height="15" rx="4" fill="#e6f7f4" stroke="#0d9488" stroke-width="1.5"/>
            <rect x="40" y="105" width="120" height="90" rx="14" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
            <rect x="60" y="120" width="80" height="55" rx="8" fill="#e6f7f4" stroke="#0d9488" stroke-width="1"/>
            <circle cx="75" cy="135" r="5" fill="#059669"/>
            <circle cx="95" cy="135" r="5" fill="#0d9488"/>
            <circle cx="115" cy="135" r="5" fill="#d97706"/>
            <rect x="68" y="148" width="6" height="16" rx="2" fill="#0d9488" opacity="0.4"/>
            <rect x="78" y="144" width="6" height="20" rx="2" fill="#0d9488" opacity="0.6"/>
            <rect x="88" y="140" width="6" height="24" rx="2" fill="#0d9488" opacity="0.8"/>
            <rect x="98" y="136" width="6" height="28" rx="2" fill="#0d9488"/>
            <rect x="10" y="108" width="28" height="72" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
            <rect x="162" y="108" width="28" height="72" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
            <ellipse cx="70" cy="202" rx="20" ry="10" fill="#e6f7f4" stroke="#0d9488" stroke-width="1.5"/>
            <ellipse cx="130" cy="202" rx="20" ry="10" fill="#e6f7f4" stroke="#0d9488" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="scan-beam"></div>
      </div>

      <div class="signal-bars" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </main>

  <footer class="footer-landing">
    <span>© <span id="year"></span> Lambda Robotics</span>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
